<!DOCTYPE html>
<html>

<head>
    <title>Food Ordering System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Food Ordering System</h1>

    <div class="navbar">
        <a href="#">Home</a>
        <a href="#">Restaurants</a>
        <a href="#">Orders</a>
        <a href="#">Login</a>
    </div>

    <h2>Empire Restaurant</h2>

    <div class="restaurant">

        <div class="food-card">
            <img src="images/butter-chicken.jpg" alt="Butter Chicken">
            <h3>Butter Chicken</h3>
            <p>Price: ₹200</p>
            <button>Order Now</button>
        </div>

        <div class="food-card">
            <img src="images/shawarma.jpg" alt="Chicken Shawarma">
            <h3>Chicken Shawarma</h3>
            <p>Price: ₹90</p>
            <button>Order Now</button>
        </div>

    </div>

    <h2>Coastal Kitchen</h2>

    <div class="restaurant">

        <div class="food-card">
            <img src="images/fish-fry.jpg" alt="Fish Fry">
            <h3>Fish Fry</h3>
            <p>Price: ₹180</p>
            <button>Order Now</button>
        </div>

        <div class="food-card">
            <img src="images/veg-meal.jpg" alt="Veg Meals">
            <h3>Veg Meals</h3>
            <p>Price: ₹120</p>
            <button>Order Now</button>
        </div>

    </div>

</body>

</html>
